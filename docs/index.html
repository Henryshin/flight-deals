<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Weekly Ops Report</title>
<style>
  :root {
    --excel-green: #217346;
    --grid: #d0d7de;
    --bg: #f3f2f1;
    --sheet: #ffffff;
    --text: #1f2328;
    --muted: #6e7781;
    --sel: #caf0d8;
  }
  * { box-sizing: border-box; }
  body {
    font-family: Calibri, "맑은 고딕", Arial, sans-serif;
    background: var(--bg); color: var(--text);
    margin: 0; font-size: 12.5px;
  }

  /* fake ribbon */
  .ribbon-tabs { background: var(--excel-green); color: #fff; padding: 5px 14px 0; font-size: 12px; display: flex; gap: 18px; }
  .ribbon-tabs span { padding: 5px 4px; opacity: 0.75; }
  .ribbon-tabs span.active { opacity: 1; border-bottom: 2px solid #fff; font-weight: 600; }
  .ribbon-toolbar { background: #fafafa; border-bottom: 1px solid var(--grid); padding: 6px 14px; font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 10px; }
  .formula-bar { background: #fff; border-bottom: 1px solid var(--grid); padding: 4px 14px; font-size: 11.5px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .formula-bar .cellref { border: 1px solid var(--grid); background: #fff; padding: 1px 8px; font-weight: 600; color: var(--text); border-radius: 2px; min-width: 46px; text-align: center; }
  .formula-bar .fx { color: var(--excel-green); font-style: italic; font-weight: 700; }
  .formula-bar .formula-text { color: var(--text); font-family: Consolas, monospace; }

  .sheet-wrap { padding: 18px 22px; }

  .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 20px; margin-bottom: 16px; }
  h1 { font-size: 15px; font-weight: 700; margin: 0 0 2px; }
  .sub { color: var(--muted); font-size: 11px; }
  .note { background: #fffbe6; border: 1px solid #e8d98a; border-radius: 2px; padding: 6px 10px; font-size: 10.5px; color: #6b5c1f; margin-bottom: 16px; }
  .note code { color: #4a3f10; font-family: Consolas, monospace; }

  h2 {
    font-size: 12px; font-weight: 700; margin: 20px 0 0; color: #fff; background: var(--excel-green);
    padding: 5px 10px; border: 1px solid #1a5c38;
  }

  table.sheet { width: 100%; border-collapse: collapse; background: var(--sheet); table-layout: fixed; }
  table.sheet th, table.sheet td {
    border: 1px solid var(--grid); padding: 6px 9px; font-size: 11.5px; text-align: left;
  }
  table.sheet th { background: #eaf3ee; color: #14532d; font-weight: 700; }
  table.sheet tbody tr:nth-child(even) td { background: #f8faf9; }
  table.sheet tbody tr:hover td { background: var(--sel); }
  table.sheet a { color: #0b5cab; text-decoration: none; }
  table.sheet a:hover { text-decoration: underline; }
  td.num { text-align: right; font-family: Consolas, monospace; }
  td.pct.up { color: #b3261e; font-weight: 700; }
  .empty-row td { color: var(--muted); text-align: center; padding: 18px; font-style: italic; }

  .status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 5px; }
  .status-dot.ok { background: #217346; }
  .status-dot.waiting { background: #c9a227; }
  .status-dot.none { background: #b7bcc4; }

  /* calendar styled as a mini worksheet */
  .calendar { background: var(--sheet); border: 1px solid var(--grid); width: 236px; flex-shrink: 0; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; background: #eaf3ee; border-bottom: 1px solid var(--grid); padding: 4px 8px; }
  .cal-head button { background: none; border: none; cursor: pointer; color: #14532d; font-size: 12px; padding: 0 4px; font-weight: 700; }
  .cal-head button:hover { color: var(--excel-green); }
  .cal-title { font-size: 11.5px; font-weight: 700; color: #14532d; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal-grid .dow { font-size: 9.5px; color: var(--muted); text-align: center; padding: 2px 0; border: 1px solid var(--grid); background: #fafafa; }
  .cal-grid .day { font-size: 10.5px; text-align: center; padding: 3px 0; border: 1px solid var(--grid); color: var(--text); }
  .cal-grid .day.blank { background: #fafafa; }
  .cal-grid .day.sat { color: #0b5cab; }
  .cal-grid .day.sun, .cal-grid .day.holiday { color: #b3261e; }
  .cal-grid .day.today { background: var(--excel-green); color: white; font-weight: 700; }
  .cal-grid .day.holiday:not(.today) { background: #fdecea; }

  #generated-at { color: var(--muted); font-size: 10px; margin-top: 18px; padding: 0 22px 16px; }
</style>
</head>
<body>
  <div class="ribbon-tabs">
    <span>파일</span><span class="active">홈</span><span>삽입</span><span>페이지 레이아웃</span><span>데이터</span><span>검토</span><span>보기</span>
  </div>
  <div class="ribbon-toolbar">Calibri · 11 · 표준 · 일반</div>
  <div class="formula-bar">
    <span class="cellref">A1</span>
    <span class="fx">fx</span>
    <span class="formula-text">=WEEKLY_OPS_REPORT()</span>
  </div>

  <div class="sheet-wrap">
    <div class="topbar">
      <div>
        <h1>Weekly Ops Report</h1>
        <div class="sub">지표 자동 갱신 · 최근 30일 기준값 대비 변동 15% 이상 항목만 표시</div>
      </div>
      <div class="calendar" id="calendar"></div>
    </div>

    <div class="note">
      항목 추가/삭제는 저장소의 <code>data/routes.json</code>을 수정해 커밋하면 다음 갱신부터 반영됩니다.
      값은 수집 시점의 스냅샷이며, 실제 예약 시점에는 달라질 수 있습니다.
    </div>

    <h2>변동 항목</h2>
    <table class="sheet">
      <thead>
        <tr>
          <th style="width:16%">항목</th>
          <th style="width:26%">기간</th>
          <th style="width:14%">일정</th>
          <th style="width:11%">현재값</th>
          <th style="width:11%">기준값</th>
          <th style="width:8%">변동율</th>
        </tr>
      </thead>
      <tbody id="deals"></tbody>
    </table>

    <h2>모니터링 현황</h2>
    <table class="sheet">
      <thead>
        <tr><th style="width:12%">상태</th><th style="width:24%">항목</th><th style="width:12%">표본 수</th><th style="width:16%">마지막 갱신일</th><th>최근 관측값</th></tr>
      </thead>
      <tbody id="routes-status"></tbody>
    </table>
  </div>

  <div id="generated-at"></div>

  <script>
    const cacheBust = `?t=${Date.now()}`;
    let holidaySet = new Set();

    async function loadDeals() {
      const res = await fetch(`data/deals.json${cacheBust}`);
      const deals = await res.json();
      const el = document.getElementById('deals');
      if (deals.length === 0) {
        el.innerHTML = '<tr class="empty-row"><td colspan="6">표시할 항목이 없습니다. 데이터가 쌓이면 여기 표시됩니다.</td></tr>';
        return;
      }
      el.innerHTML = deals.map(d => `
        <tr>
          <td><a href="${d.booking_url}" target="_blank" rel="noopener">${d.route.label || (d.route.origin + ' → ' + d.route.destination)}</a></td>
          <td>${d.depart_date} (${d.depart_weekday}) ~ ${d.return_date} (${d.return_weekday})</td>
          <td>${d.nights}박 ${d.days}일 · 연차 ${d.leave_days}개</td>
          <td class="num">${d.current_price.toLocaleString()}</td>
          <td class="num">${d.avg_price.toLocaleString()}</td>
          <td class="num pct up">-${d.discount_pct}%</td>
        </tr>
      `).join('');
    }

    async function loadRoutesStatus() {
      const res = await fetch(`data/routes_status.json${cacheBust}`);
      const routes = await res.json();
      const el = document.getElementById('routes-status');
      if (routes.length === 0) {
        el.innerHTML = '<tr class="empty-row"><td colspan="5">등록된 항목이 없습니다.</td></tr>';
        return;
      }
      el.innerHTML = routes.map(r => {
        let dot = 'none', statusText = '대기';
        if (r.sample_count > 0) {
          dot = r.sample_count >= 3 ? 'ok' : 'waiting';
          statusText = r.sample_count >= 3 ? '정상' : '표본 부족';
        }
        const latestValue = r.latest_price
          ? `${r.latest_price.toLocaleString()} (${r.latest_depart_date}~${r.latest_return_date})`
          : '-';
        return `
          <tr>
            <td><span class="status-dot ${dot}"></span>${statusText}</td>
            <td>${r.label || (r.origin + ' → ' + r.destination)}</td>
            <td class="num">${r.sample_count}</td>
            <td>${r.last_collected_at || '-'}</td>
            <td class="num">${latestValue}</td>
          </tr>
        `;
      }).join('');
    }

    async function loadMeta() {
      try {
        const res = await fetch(`data/meta.json${cacheBust}`);
        const meta = await res.json();
        document.getElementById('generated-at').textContent =
          `Last sync: ${new Date(meta.generated_at).toLocaleString('ko-KR')}`;
      } catch (e) {}
    }

    // ---- calendar ----
    let calYear, calMonth; // month: 0-11

    function pad(n) { return String(n).padStart(2, '0'); }

    function renderCalendar() {
      const el = document.getElementById('calendar');
      const first = new Date(calYear, calMonth, 1);
      const startDow = (first.getDay() + 6) % 7; // 월요일 시작
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === calYear && today.getMonth() === calMonth;

      let cells = '';
      for (let i = 0; i < startDow; i++) cells += '<div class="day blank"></div>';
      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = `${calYear}-${pad(calMonth + 1)}-${pad(d)}`;
        const dow = (startDow + d - 1) % 7;
        const classes = ['day'];
        if (dow === 5) classes.push('sat');
        if (dow === 6) classes.push('sun');
        if (holidaySet.has(dateStr)) classes.push('holiday');
        if (isCurrentMonth && d === today.getDate()) classes.push('today');
        cells += `<div class="${classes.join(' ')}">${d}</div>`;
      }

      el.innerHTML = `
        <div class="cal-head">
          <button onclick="shiftMonth(-1)">‹</button>
          <div class="cal-title">${calYear}.${pad(calMonth + 1)}</div>
          <button onclick="shiftMonth(1)">›</button>
        </div>
        <div class="cal-grid">
          <div class="dow">월</div><div class="dow">화</div><div class="dow">수</div>
          <div class="dow">목</div><div class="dow">금</div><div class="dow">토</div><div class="dow">일</div>
          ${cells}
        </div>
      `;
    }

    function shiftMonth(delta) {
      calMonth += delta;
      if (calMonth < 0) { calMonth = 11; calYear -= 1; }
      if (calMonth > 11) { calMonth = 0; calYear += 1; }
      renderCalendar();
    }
    window.shiftMonth = shiftMonth;

    async function initCalendar() {
      const today = new Date();
      calYear = today.getFullYear();
      calMonth = today.getMonth();
      try {
        const res = await fetch(`data/holidays.json${cacheBust}`);
        holidaySet = new Set(await res.json());
      } catch (e) {}
      renderCalendar();
    }

    loadDeals();
    loadRoutesStatus();
    loadMeta();
    initCalendar();
  </script>
</body>
</html>
