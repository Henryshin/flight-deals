name: Collect flight prices

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Collect prices
        run: python scripts/collect.py

      - name: Build dashboard data
        run: python scripts/build_dashboard_data.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/prices.csv docs/data
          git diff --cached --quiet || git commit -m "chore: update flight price data"
          # 크롤링(수십 분) 동안 다른 커밋이 먼저 들어오면 non-fast-forward로 push가
          # 실패해 이번 수집분이 유실되므로, push 전에 rebase로 최신화한다.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
